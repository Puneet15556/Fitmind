<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FitMind 💪</title>
<style>
  :root { --bg:#0f1115; --card:#1a1d24; --accent:#22c55e; --accent2:#f59e0b;
          --text:#e7e9ee; --muted:#8b909a; --user:#2563eb; }
  * { box-sizing:border-box; margin:0; padding:0; font-family:system-ui,Segoe UI,sans-serif; }
  body { background:var(--bg); color:var(--text); display:flex; justify-content:center; }
  .app { width:100%; max-width:460px; height:100vh; display:flex; flex-direction:column; }

  header { padding:14px 16px; background:var(--card); border-bottom:1px solid #262a33; }
  header h1 { font-size:18px; } header .sub { font-size:12px; color:var(--muted); }

  /* daily budget bar */
  .budget { padding:12px 16px; background:var(--card); border-bottom:1px solid #262a33; }
  .budget .row { display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px; }
  .bar { height:10px; background:#262a33; border-radius:6px; overflow:hidden; }
  .bar > div { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--accent2)); transition:width .4s; }

  .chat { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:10px; }
  .msg { max-width:85%; padding:10px 13px; border-radius:14px; font-size:14px; line-height:1.45; white-space:pre-wrap; }
  .msg.user { align-self:flex-end; background:var(--user); border-bottom-right-radius:4px; }
  .msg.bot  { align-self:flex-start; background:var(--card); border-bottom-left-radius:4px; }
  .msg .meta { font-size:11px; color:var(--muted); margin-top:6px; }
  .chips { display:flex; flex-wrap:wrap; gap:7px; align-self:flex-start; max-width:90%; }
  .chip { padding:7px 12px; border-radius:16px; background:var(--card); border:1px solid #2c313b;
          color:var(--accent); font-size:13px; cursor:pointer; }
  .chip:hover { background:#222732; }

  .composer { display:flex; gap:8px; padding:12px; background:var(--card); border-top:1px solid #262a33; }
  .composer input { flex:1; padding:11px 13px; border-radius:20px; border:1px solid #2c313b;
                    background:#0f1115; color:var(--text); font-size:14px; outline:none; }
  .composer button { padding:0 18px; border:none; border-radius:20px; background:var(--accent);
                     color:#06210f; font-weight:600; cursor:pointer; font-size:14px; }
  .composer button:disabled { opacity:.5; cursor:default; }
  .hint { font-size:11px; color:var(--muted); padding:0 16px 8px; }

  .gear { float:right; cursor:pointer; font-size:18px; background:none; border:none; color:var(--text); }

  /* settings overlay */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none;
             align-items:center; justify-content:center; z-index:10; }
  .overlay.show { display:flex; }
  .sheet { background:var(--card); width:90%; max-width:380px; border-radius:16px; padding:18px; }
  .sheet h2 { font-size:16px; margin-bottom:14px; }
  .field { margin-bottom:11px; }
  .field label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
  .field input, .field select { width:100%; padding:9px 11px; border-radius:9px;
        border:1px solid #2c313b; background:#0f1115; color:var(--text); font-size:14px; }
  .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .sheet .actions { display:flex; gap:8px; margin-top:14px; }
  .sheet button { flex:1; padding:11px; border:none; border-radius:10px; font-weight:600; cursor:pointer; }
  .btn-calc { background:var(--accent); color:#06210f; }
  .btn-close { background:#2c313b; color:var(--text); }
  .result { margin-top:12px; font-size:13px; color:var(--muted); display:none; }
  .result.show { display:block; }
  .result b { color:var(--accent); }
</style>
</head>
<body>
<div class="app">
  <header>
    <button class="gear" id="gear" title="Set your calorie budget">⚙️</button>
    <h1>FitMind 💪</h1>
    <div class="sub">offline calorie tracker · English / हिंदी / Hinglish</div>
  </header>

  <div class="budget">
    <div class="row"><span>Today</span><span id="totalTxt">0 cal</span></div>
    <div class="bar" id="bar"><div id="barFill"></div></div>
    <div class="row" id="budgetRow" style="margin-top:6px;color:var(--muted)">
      <span id="budgetTxt"></span><span id="leftTxt"></span>
    </div>
    <div class="row" id="noBudgetRow" style="margin-top:6px;color:var(--muted);font-size:12px">
      <span>No budget set — tap ⚙️ to get your personalized target</span>
    </div>
  </div>

  <div class="chat" id="chat">
    <div class="msg bot">Namaste! 🙏 Kya khaaya? Type karo —
"2 roti aur dal", "I had grilled chicken", "मैंने पोहा खाया"</div>
  </div>

  <!-- settings overlay -->
  <div class="overlay" id="overlay">
    <div class="sheet">
      <h2>Your calorie budget 🎯</h2>
      <div class="grid2">
        <div class="field"><label>Age</label><input id="age" type="number" value="25"></div>
        <div class="field"><label>Weight (kg)</label><input id="weight" type="number" value="75"></div>
      </div>
      <div class="grid2">
        <div class="field"><label>Height (cm)</label><input id="height" type="number" value="175"></div>
        <div class="field"><label>Gender</label>
          <select id="gender"><option value="male">Male</option><option value="female">Female</option></select>
        </div>
      </div>
      <div class="field"><label>Activity</label>
        <select id="activity">
          <option value="sedentary">Sedentary (no exercise)</option>
          <option value="light">Light (1-3 gym days)</option>
          <option value="moderate" selected>Moderate (3-5 gym days)</option>
          <option value="active">Active (6-7 gym days)</option>
          <option value="athlete">Athlete (2x/day)</option>
        </select>
      </div>
      <div class="field"><label>Goal &amp; pace</label>
        <select id="goal">
          <option value="lose">Lose weight (~0.5 kg/week)</option>
          <option value="lose_slow">Lose slowly (~0.25 kg/week)</option>
          <option value="maintain" selected>Maintain weight</option>
          <option value="gain_slow">Lean gain (~0.25 kg/week)</option>
          <option value="gain">Gain / bulk (~0.5 kg/week)</option>
        </select>
      </div>
      <div class="result" id="calcResult"></div>
      <div class="actions">
        <button class="btn-close" id="closeSet">Close</button>
        <button class="btn-calc" id="calcBtn">Calculate</button>
      </div>

      <div class="field" style="border-top:1px solid #2c313b; padding-top:13px; margin-top:14px">
        <label>Or just set your own target</label>
        <div style="display:flex; gap:8px">
          <input id="manualBudget" type="number" placeholder="e.g. 1800 cal">
          <button class="btn-calc" id="manualBtn" style="flex:0 0 auto; padding:9px 16px">Set</button>
        </div>
      </div>
    </div>
  </div>

  <div class="hint" id="hint"></div>
  <div class="composer">
    <input id="input" placeholder="kya khaaya bhai?" autocomplete="off">
    <button id="send">Send</button>
  </div>
</div>

<script>
const API = "";                 // same origin (served by backend)
const USER_ID = 1;
const chat = document.getElementById("chat");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const hint = document.getElementById("hint");

function addMsg(text, who, meta) {
  const d = document.createElement("div");
  d.className = "msg " + who;
  d.textContent = text;
  if (meta) { const m = document.createElement("div"); m.className="meta"; m.textContent=meta; d.appendChild(m); }
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}

function renderChips(chips) {
  const wrap = document.createElement("div");
  wrap.className = "chips";
  chips.forEach(c => {
    const b = document.createElement("button");
    b.className = "chip";
    b.textContent = c;
    b.onclick = () => { input.value = c; send(); };   // tap -> fill + send
    wrap.appendChild(b);
  });
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function render(total, budget, left) {
  document.getElementById("totalTxt").textContent = total + " cal";
  const hasBudget = budget != null;
  // show bar + budget row only if a budget is set
  document.getElementById("bar").style.display = hasBudget ? "block" : "none";
  document.getElementById("budgetRow").style.display = hasBudget ? "flex" : "none";
  document.getElementById("noBudgetRow").style.display = hasBudget ? "none" : "flex";
  if (hasBudget) {
    document.getElementById("budgetTxt").textContent = "Budget: " + budget;
    document.getElementById("leftTxt").textContent = "Left: " + left;
    const pct = Math.min(100, Math.round(total / budget * 100));
    document.getElementById("barFill").style.width = pct + "%";
  }
}

async function refreshToday() {
  try {
    const r = await fetch(API + "/today/" + USER_ID);
    const d = await r.json();
    // budget recomputes from the start: today's total is always summed, and
    // once a budget exists, budget_left = budget - total (whole day counted)
    render(d.total_cal_so_far, d.budget, d.budget_left);
  } catch (e) {}
}

async function send() {
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, "user");
  input.value = "";
  sendBtn.disabled = true;
  hint.textContent = "FitMind soch raha hai... 🤔";
  try {
    const r = await fetch(API + "/log-meal", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ user_id: USER_ID, text })
    });
    const d = await r.json();
    if (d.detail || d.error) { addMsg("⚠️ " + (d.detail || d.error), "bot"); }
    else {
      // only the 'log' intent carries calories/protein -> show as meta
      const meta = (d.calories && d.protein_g != null)
        ? `calories ${d.calories[0]}-${d.calories[1]} · protein ${d.protein_g}g` : null;
      addMsg(d.reply, "bot", meta);
      if (d.chips) renderChips(d.chips);     // help intent -> tappable options
      refreshToday();
    }
  } catch (e) {
    addMsg("⚠️ Backend se connect nahi hua. Server chal raha hai?", "bot");
  }
  hint.textContent = "";
  sendBtn.disabled = false;
  input.focus();
}

sendBtn.onclick = send;
input.addEventListener("keydown", e => { if (e.key === "Enter") send(); });

// --- settings / budget calculator ---
const overlay = document.getElementById("overlay");
document.getElementById("gear").onclick = () => overlay.classList.add("show");
document.getElementById("closeSet").onclick = () => overlay.classList.remove("show");

document.getElementById("calcBtn").onclick = async () => {
  const body = {
    user_id: USER_ID,
    age: +document.getElementById("age").value,
    weight_kg: +document.getElementById("weight").value,
    height_cm: +document.getElementById("height").value,
    gender: document.getElementById("gender").value,
    activity: document.getElementById("activity").value,
    goal: document.getElementById("goal").value,
  };
  try {
    const r = await fetch(API + "/calculate-budget", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify(body)
    });
    const d = await r.json();
    if (d.detail) { alert("Check your inputs"); return; }
    const res = document.getElementById("calcResult");
    res.className = "result show";
    res.innerHTML = `BMR: ${d.bmr} · TDEE: ${d.tdee}<br>` +
      `Your daily budget: <b>${d.daily_budget} cal</b><br>` +
      `Protein target: <b>${d.protein_target_g}g</b>`;
    refreshToday();
    addMsg(`Budget set to ${d.daily_budget} cal/day (protein ${d.protein_target_g}g). Let's go! 💪`, "bot");
  } catch (e) { alert("Backend se connect nahi hua"); }
};

// manual "set your own target"
document.getElementById("manualBtn").onclick = async () => {
  const val = +document.getElementById("manualBudget").value;
  if (!val || val < 800) { alert("Enter a valid number (800+)"); return; }
  try {
    await fetch(API + "/profile", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ user_id: USER_ID, daily_budget: val })
    });
    overlay.classList.remove("show");
    refreshToday();
    addMsg(`Budget set to ${val} cal/day. Let's go! 💪`, "bot");
  } catch (e) { alert("Backend se connect nahi hua"); }
};

refreshToday();
</script>
</body>
</html>
